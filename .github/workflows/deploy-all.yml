name: Deploy All Projects

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build All Projects
        run: pnpm -r build

      # Prepare deployment directory
      - name: Prepare Deployment
        run: |
          mkdir -p public/json-toolkit
          mkdir -p public/color-wizard
          mkdir -p public/regex-visualizer
          mkdir -p public/diff-checker
          cp -r json-toolkit/dist/* public/json-toolkit/
          cp -r color-wizard/dist/* public/color-wizard/
          cp -r regex-visualizer/dist/* public/regex-visualizer/
          cp -r diff-checker/dist/* public/diff-checker/
          cp index.html public/
          cp favicon.svg public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: ifwechat.com
